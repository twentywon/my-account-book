<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 가계부 - 최종 통합본</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #4f46e5; --income: #3b82f6; --expense: #ef4444; --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; --border: #e5e7eb; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: var(--text-main); }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { padding: 20px; background: #f9fafb; border-bottom: 1px solid var(--border); text-align: center; }
        .tabs { display: flex; background: #f9fafb; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #6b7280; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: white; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        .input-card { background: #f9fafb; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; width: 100%; box-sizing: border-box; font-size: 16px; }
        
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .summary-item { padding: 15px; background: white; border: 1px solid var(--border); border-radius: 10px; text-align: center; }
        .txt-income { color: var(--income); font-weight: bold; }
        .txt-expense { color: var(--expense); font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 400px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid var(--border); text-align: center; }
        .table-scroll { overflow-x: auto; }
        .delete-btn { background: #fee2e2; color: #ef4444; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; }

        /* 통계 탭 스타일 */
        .chart-box { height: 250px; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">📊 스마트 가계부</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('listTab', this)">내역목록</button>
        <button class="tab-btn" onclick="switchTab('inputTab', this)">입력/설정</button>
        <button class="tab-btn" onclick="switchTab('statsTab', this)">통계</button>
    </div>

    <div id="listTab" class="tab-content active">
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <input type="month" id="searchMonth" onchange="renderAll()" style="flex: 1;">
            <input type="text" id="searchInput" placeholder="검색어..." oninput="renderAll()" style="flex: 1.5;">
        </div>

        <div class="summary">
            <div class="summary-item">수입<br><span id="totalIncome" class="txt-income">0</span></div>
            <div class="summary-item">지출<br><span id="totalExpense" class="txt-expense">0</span></div>
        </div>

        <div class="table-scroll">
            <table>
                <thead>
                    <tr><th>날짜</th><th>항목</th><th>내용</th><th>금액</th><th>-</th></tr>
                </thead>
                <tbody id="mainTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="inputTab" class="tab-content">
        <div class="input-card">
            <h4 style="margin-top:0;">➕ 내역 추가</h4>
            <select id="typeInput" onchange="updateCategories()">
                <option value="expense">지출</option>
                <option value="income">수입</option>
            </select>
            <input type="date" id="dateInput">
            <select id="categoryInput"></select>
            <input type="text" id="detailInput" placeholder="상세 내용">
            <input type="number" id="amountInput" placeholder="금액">
            <button class="btn-submit" onclick="addEntry()">기록 저장</button>
        </div>

        <div class="input-card">
            <h4>🔄 고정 수입/지출 설정</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <select id="fixedType"><option value="expense">지출</option><option value="income">수입</option></select>
                <input type="number" id="fixedDay" placeholder="날짜(1-31)">
            </div>
            <input type="text" id="fixedDetail" placeholder="고정 항목명 (예: 월세)">
            <input type="number" id="fixedAmount" placeholder="고정 금액">
            <button class="btn-submit" style="background: #10b981;" onclick="addFixedEntry()">고정 내역 등록</button>
            <div class="table-scroll" style="margin-top: 15px;">
                <table style="font-size: 12px;">
                    <tbody id="fixedTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="statsTab" class="tab-content">
        <div class="summary-item" style="margin-bottom: 20px;">
            <h4>지출 구성 비율</h4>
            <div id="chartContainer" class="chart-box">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyBJ71IhAdTuQ2msJR_28Fyo50Q7Map5u58",
        authDomain: "money-c34ec.firebaseapp.com",
        projectId: "money-c34ec",
        storageBucket: "money-c34ec.firebasestorage.app",
        messagingSenderId: "969800282507",
        appId: "1:969800282507:web:c1fc6cdfd7417526e57f8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let entries = [];
    let fixedEntries = [];
    let myChart = null;
    const categories = {
        income: ['급여', '용돈', '부수입', '상여금'],
        expense: ['식비', '교통비', '문화생활', '생필품', '주거/통신']
    };

    window.onload = function() {
        const now = new Date();
        document.getElementById('dateInput').value = now.toISOString().slice(0, 10);
        document.getElementById('searchMonth').value = now.toISOString().slice(0, 7);
        updateCategories();
        loadData();
    };

    // 데이터 불러오기
    function loadData() {
        db.collection("budget").doc("my_data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                entries = data.entries || [];
                fixedEntries = data.fixedEntries || [];
                
                // 고정 지출 적용 로직
                checkAndApplyFixed();
                renderAll();
                renderFixedTable(); // 오류가 났던 바로 그 함수! 아래에 정의함.
            } else {
                saveData();
            }
        });
    }

    function saveData() {
        db.collection("budget").doc("my_data").set({ 
            entries: entries, 
            fixedEntries: fixedEntries 
        });
    }

    // [중요] 오류의 원인이었던 함수 정의
    function renderFixedTable() {
        const tbody = document.getElementById('fixedTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        fixedEntries.forEach((fe, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>매월 ${fe.day}일</td>
                <td>${fe.detail}</td>
                <td>${Number(fe.amount).toLocaleString()}</td>
                <td><button class="delete-btn" onclick="deleteFixed(${index})">❌</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderAll() {
        const tableBody = document.getElementById('mainTableBody');
        const searchMonth = document.getElementById('searchMonth').value;
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        tableBody.innerHTML = '';
        let incSum = 0; let expSum = 0;
        let chartData = {};

        const filtered = entries.filter(e => {
            return e.date.startsWith(searchMonth) && (e.detail.toLowerCase().includes(keyword) || e.category.toLowerCase().includes(keyword));
        }).sort((a, b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const isInc = item.type === 'income';
            if(isInc) incSum += Number(item.amount);
            else {
                expSum += Number(item.amount);
                chartData[item.category] = (chartData[item.category] || 0) + Number(item.amount);
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date.slice(5)}</td>
                <td>${item.category}</td>
                <td style="text-align:left">${item.detail}</td>
                <td class="${isInc ? 'txt-income' : 'txt-expense'}">${Number(item.amount).toLocaleString()}</td>
                <td><button class="delete-btn" onclick="deleteEntry(${item.id})">❌</button></td>
            `;
            tableBody.appendChild(tr);
        });

        document.getElementById('totalIncome').innerText = incSum.toLocaleString() + "원";
        document.getElementById('totalExpense').innerText = expSum.toLocaleString() + "원";
        
        updateChart(chartData);
    }

    function addEntry() {
        const type = document.getElementById('typeInput').value;
        const date = document.getElementById('dateInput').value;
        const category = document.getElementById('categoryInput').value;
        const detail = document.getElementById('detailInput').value;
        const amount = document.getElementById('amountInput').value;

        if (!date || !amount) return alert("데이터를 입력하세요.");

        entries.push({ id: Date.now(), type, date, category, detail, amount: Number(amount) });
        saveData();
        document.getElementById('detailInput').value = '';
        document.getElementById('amountInput').value = '';
    }

    function addFixedEntry() {
        const type = document.getElementById('fixedType').value;
        const day = document.getElementById('fixedDay').value;
        const detail = document.getElementById('fixedDetail').value;
        const amount = document.getElementById('fixedAmount').value;

        if(!day || !detail || !amount) return alert("고정 내역 정보를 입력하세요.");

        fixedEntries.push({ type, day: Number(day), detail, amount: Number(amount), lastApplied: "" });
        saveData();
        alert("고정 내역이 등록되었습니다.");
    }

    function checkAndApplyFixed() {
        const currentMonth = document.getElementById('searchMonth').value;
        let changed = false;

        fixedEntries.forEach(fe => {
            const tag = `fixed-${fe.detail}-${currentMonth}`;
            const alreadyExists = entries.some(e => e.fixedTag === tag);

            if (!alreadyExists) {
                const dateStr = `${currentMonth}-${String(fe.day).padStart(2, '0')}`;
                entries.push({
                    id: Date.now() + Math.random(),
                    type: fe.type,
                    date: dateStr,
                    category: fe.type === 'income' ? '급여' : '주거/통신',
                    detail: `[고정] ${fe.detail}`,
                    amount: fe.amount,
                    fixedTag: tag
                });
                changed = true;
            }
        });
        if (changed) saveData();
    }

    function deleteEntry(id) {
        if(!confirm("삭제할까요?")) return;
        entries = entries.filter(e => e.id !== id);
        saveData();
    }

    function deleteFixed(index) {
        fixedEntries.splice(index, 1);
        saveData();
    }

    function updateCategories() {
        const type = document.getElementById('typeInput').value;
        const catSelect = document.getElementById('categoryInput');
        catSelect.innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'statsTab') renderAll();
    }

    function updateChart(dataMap) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const labels = Object.keys(dataMap);
        const values = Object.values(dataMap);

        if (myChart) myChart.destroy();
        if (labels.length === 0) return;

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
