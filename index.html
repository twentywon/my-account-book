<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 스마트 가계부</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --income: #3b82f6; --expense: #ef4444;
            --bg-color: #f3f4f6; --card-bg: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --border: #e5e7eb;
        }

        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: var(--text-main); line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative;}
        
        .header { padding: 20px; background-color: #f9fafb; border-bottom: 1px solid var(--border); }
        .header h1 { margin: 0 0 15px 0; font-size: 22px; color: var(--primary); text-align: center; }
        .file-controls { display: flex; gap: 8px; justify-content: center; }
        .btn-small { flex: 1; padding: 12px; font-size: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-align: center; }
        .btn-save { background-color: var(--primary); color: white; }
        .btn-load { background-color: #f3f4f6; color: var(--text-main); border: 1px solid #d1d5db; }
        input[type="file"] { display: none; }

        .tabs { display: flex; background-color: #f9fafb; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 16px 5px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: bold; color: var(--text-muted); }
        .tab-btn.active { background-color: white; color: var(--primary); border-bottom: 3px solid var(--primary); }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        .input-card { background: #f9fafb; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        .radio-group { margin-bottom: 20px; display: flex; justify-content: center; gap: 30px; }
        .radio-group label { font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .radio-group input { width: 20px; height: 20px; }
        .txt-income { color: var(--income); }
        .txt-expense { color: var(--expense); }
        
        .input-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .input-row input, .input-row select { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; background-color: white; }
        
        .btn-submit { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.2s;}

        .filter-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .filter-section h3 { margin: 0; font-size: 18px; }
        .filter-controls-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-controls-row input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; flex: 1; min-width: 140px; }

        .comment-box { background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 15px; font-weight: 500; text-align: center; }
        .comment-box.warn { background-color: #fef2f2; border: 1px solid #fca5a5; }

        .table-wrapper { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 25px; }
        .table-header { padding: 15px; font-weight: bold; font-size: 16px; color: white; display: flex; justify-content: space-between; }
        .bg-income { background-color: var(--income); }
        .bg-expense { background-color: var(--expense); }
        .table-scroll { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 520px; }
        th, td { padding: 12px 6px; border-bottom: 1px solid var(--border); text-align: center; }
        th { background-color: #f9fafb; color: var(--text-muted); font-weight: 600; user-select: none; }
        
        .sortable-th { cursor: pointer; transition: background-color 0.2s; }
        .sortable-th:hover { background-color: #e5e7eb; color: var(--primary); }

        .action-btns { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .delete-btn { padding: 6px 10px; background-color: #fee2e2; color: var(--expense); border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .edit-btn { padding: 6px 10px; background-color: #e0e7ff; color: var(--primary); border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .save-inline-btn { padding: 6px 10px; background-color: #10b981; color: white; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .cancel-inline-btn { padding: 6px 10px; background-color: #9ca3af; color: white; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        
        .inline-input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--primary); border-radius: 4px; font-size: 13px; }

        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #fff; border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }
        .summary div { text-align: center; font-size: 14px; color: var(--text-muted); }
        .summary div span { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; }
        .summary .full-width { grid-column: span 2; border-top: 1px dashed var(--border); padding-top: 15px; margin-top: 10px; }
        .summary .full-width span { font-size: 22px; color: var(--primary); }

        .calendar-container { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .calendar-container h4 { margin: 0 0 15px 0; text-align: center; font-size: 18px; color: var(--text-main); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-header { text-align: center; font-weight: bold; font-size: 13px; padding: 8px 0; background: #f9fafb; color: var(--text-muted); border-radius: 4px; }
        
        .cal-day { min-height: 60px; padding: 4px; border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; background: #fff; cursor: pointer; transition: background-color 0.2s; }
        .cal-day:hover { background-color: #f3f4f6; }
        .cal-date { font-weight: bold; font-size: 12px; margin-bottom: 2px; color: var(--text-main); }
        .cal-empty { background: transparent; border: none; cursor: default; }
        
        .cal-bar-wrapper { margin-top: auto; width: 100%; display: flex; flex-direction: column; gap: 2px; }
        .cal-bar-inc { height: 6px; background-color: var(--income); border-radius: 3px; min-width: 2px; }
        .cal-bar-exp { height: 6px; background-color: var(--expense); border-radius: 3px; min-width: 2px; }

        .chart-container { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .chart-container h4 { margin: 0 0 15px 0; text-align: center; font-size: 18px; color: var(--text-main); }
        .chart-box { position: relative; height: 300px; width: 100%; display: flex; justify-content: center; align-items: center;}
        .no-data-msg { text-align: center; color: var(--text-muted); font-size: 15px; }

        .data-section h3 { font-size: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-top: 0; }
        .data-list { display: flex; flex-wrap: wrap; gap: 10px; list-style: none; padding: 0; margin: 0;}
        .data-item { background-color: #f3f4f6; padding: 10px 15px; border-radius: 25px; font-size: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
        .btn-add { background-color: var(--text-main); color: white; border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }

        .fixed-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
        .fixed-form input, .fixed-form select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; width: 100%; }
        .fixed-form button { grid-column: span 2; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .fixed-table { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 10px; }
        .fixed-table th, .fixed-table td { padding: 10px 6px; border: 1px solid var(--border); text-align: center; }
        .fixed-table th { background: #f3f4f6; }

        /* 플로팅 계산기 스타일 */
        .floating-calc-btn {
            position: fixed; right: 20px; bottom: 20px; width: 60px; height: 60px;
            background-color: var(--primary); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            cursor: pointer; z-index: 1000; border: none; transition: transform 0.2s;
        }
        .floating-calc-btn:hover { transform: scale(1.1); }
        
        .calculator-panel {
            position: fixed; right: 20px; bottom: 90px; width: 260px;
            background-color: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            padding: 15px; display: none; z-index: 1000; border: 1px solid var(--border);
        }
        .calc-display {
            width: 100%; height: 50px; margin-bottom: 12px; font-size: 24px;
            text-align: right; padding: 10px; box-sizing: border-box;
            border: 1px solid var(--border); border-radius: 8px; background: #f9fafb; color: var(--text-main); font-weight: bold;
        }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-key {
            padding: 12px 0; font-size: 18px; text-align: center; background: #f3f4f6;
            border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-weight: 500;
        }
        .calc-key:active { background: #e5e7eb; }
        .calc-key.op { background: #e0e7ff; color: var(--primary); font-weight: bold; }
        .calc-key.eval { background: var(--primary); color: white; grid-column: span 2; }
        .calc-key.clear { background: #fee2e2; color: var(--expense); font-weight: bold; }

        @media (min-width: 600px) {
            .input-row { flex-direction: row; }
            .summary { grid-template-columns: 1fr 1fr 1fr; }
            .summary .full-width { grid-column: span 1; border-top: none; margin-top: 0; padding-top: 0; }
            .filter-controls-row { flex-wrap: nowrap; }
            .cal-day { min-height: 80px; padding: 8px; }
            .cal-date { font-size: 14px; }
            .fixed-form { grid-template-columns: 1fr 2fr 2fr 2fr 2fr; }
            .fixed-form button { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 스마트 가계부</h1>
        <div class="file-controls">
            <button class="btn-small btn-load" onclick="document.getElementById('fileInput').click()">📂 백업 불러오기</button>
            <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
            <button class="btn-small btn-save" onclick="exportData()">💾 수동 저장</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('inputTab', this)">내역 관리</button>
        <button class="tab-btn" onclick="switchTab('statsTab', this)">월별 통계</button>
        <button class="tab-btn" onclick="switchTab('dataTab', this)">항목 설정</button>
    </div>

    <div id="inputTab" class="tab-content active">
        <div class="input-card">
            <div class="radio-group">
                <label class="txt-income"><input type="radio" name="type" value="income" onchange="updateCategoryOptions()"> 수입</label>
                <label class="txt-expense"><input type="radio" name="type" value="expense" checked onchange="updateCategoryOptions()"> 지출</label>
            </div>
            <div class="input-row">
                <input type="date" id="dateInput" required>
                <select id="categorySelect"></select>
            </div>
            <div class="input-row">
                <input type="text" id="detailInput" placeholder="세부 내용 (예: 점심 식사)">
                <input type="tel" id="amountInput" placeholder="금액 (숫자만 입력)" oninput="formatNumber(this)">
            </div>
            <button class="btn-submit" onclick="addNewEntry()">내역 추가하기</button>
        </div>

        <div class="filter-section">
            <h3>📅 내역 조회 및 필터</h3>
            <div class="filter-controls-row">
                <input type="month" id="searchMonth" onchange="syncMonths(this.value)">
                <input type="text" id="searchInput" placeholder="검색어 입력..." oninput="renderTables()">
            </div>
        </div>

        <div class="summary">
            <div>총 수입 <span id="totalIncome" class="txt-income">0</span></div>
            <div>총 지출 <span id="totalExpense" class="txt-expense">0</span></div>
            <div class="full-width">현재 잔액 <span id="netTotal">0</span></div>
        </div>

        <div class="tables-container" style="margin-top: 25px;">
            <p style="font-size: 13px; color: var(--text-muted); text-align: right; margin-bottom: 5px;">💡 표의 '날짜'나 '항목'을 클릭하면 정렬됩니다.</p>
            
            <div class="table-wrapper">
                <div class="table-header bg-income">
                    <span>수입 내역</span>
                    <span id="subTotalIncome">0 원</span>
                </div>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable-th" onclick="setSort('date')">날짜 ↕</th>
                                <th class="sortable-th" onclick="setSort('category')">항목 ↕</th>
                                <th>내용</th>
                                <th class="sortable-th" onclick="setSort('amount')">금액 ↕</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="incomeTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-header bg-expense">
                    <span>지출 내역</span>
                    <span id="subTotalExpense">0 원</span>
                </div>
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable-th" onclick="setSort('date')">날짜 ↕</th>
                                <th class="sortable-th" onclick="setSort('category')">항목 ↕</th>
                                <th>내용</th>
                                <th class="sortable-th" onclick="setSort('amount')">금액 ↕</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="statsTab" class="tab-content">
        <div class="filter-section">
            <h3>📅 통계 조회 월</h3>
            <input type="month" id="statsMonth" onchange="syncMonths(this.value)">
        </div>

        <div id="comparisonComment" class="comment-box">데이터 분석 중...</div>

        <div class="calendar-container">
            <h4>🗓️ 이번 달 흐름 (상대적 비율)</h4>
            <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <div class="chart-container">
            <h4>🔴 지출 비율</h4>
            <div id="expenseChartBox" class="chart-box"></div>
        </div>
        <div class="chart-container">
            <h4>🔵 수입 비율</h4>
            <div id="incomeChartBox" class="chart-box"></div>
        </div>
    </div>

    <div id="dataTab" class="tab-content">
        <div class="data-section">
            <h3 class="txt-income"><span>🔵 수입 항목</span><button class="btn-add" onclick="addCategory('income')">+ 추가</button></h3>
            <ul class="data-list" id="dataIncomeList"></ul>
        </div>
        <div class="data-section" style="margin-top: 25px;">
            <h3 class="txt-expense"><span>🔴 지출 항목</span><button class="btn-add" onclick="addCategory('expense')">+ 추가</button></h3>
            <ul class="data-list" id="dataExpenseList"></ul>
        </div>
        
        <div class="data-section" style="margin-top: 35px;">
            <h3>🔄 매월 고정 수입/지출 관리</h3>
            <div class="fixed-form">
                <select id="fixedType" onchange="updateFixedCategoryOptions()">
                    <option value="expense">지출</option>
                    <option value="income">수입</option>
                </select>
                <input type="number" id="fixedDay" min="1" max="31" placeholder="날짜 (1~31)">
                <select id="fixedCategory"></select>
                <input type="text" id="fixedDetail" placeholder="내용 (예: 월세)">
                <input type="number" id="fixedAmount" placeholder="금액 (숫자)">
                <button onclick="addFixedEntry()">고정 자금 등록</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="fixed-table">
                    <thead>
                        <tr><th>구분</th><th>일</th><th>항목</th><th>내용</th><th>금액</th><th>삭제</th></tr>
                    </thead>
                    <tbody id="fixedTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<button class="floating-calc-btn" onclick="toggleCalculator()">🧮</button>
<div class="calculator-panel" id="calcPanel">
    <input type="text" class="calc-display" id="calcDisplay" value="0" readonly>
    <div class="calc-keys">
        <button class="calc-key clear" onclick="calcInput('C')">C</button>
        <button class="calc-key op" onclick="calcInput('/')">÷</button>
        <button class="calc-key op" onclick="calcInput('*')">×</button>
        <button class="calc-key op" onclick="calcInput('-')">-</button>
        <button class="calc-key" onclick="calcInput('7')">7</button>
        <button class="calc-key" onclick="calcInput('8')">8</button>
        <button class="calc-key" onclick="calcInput('9')">9</button>
        <button class="calc-key op" onclick="calcInput('+')" style="grid-row: span 2; display: flex; align-items: center; justify-content: center;">+</button>
        <button class="calc-key" onclick="calcInput('4')">4</button>
        <button class="calc-key" onclick="calcInput('5')">5</button>
        <button class="calc-key" onclick="calcInput('6')">6</button>
        <button class="calc-key" onclick="calcInput('1')">1</button>
        <button class="calc-key" onclick="calcInput('2')">2</button>
        <button class="calc-key" onclick="calcInput('3')">3</button>
        <button class="calc-key eval" onclick="calcInput('=')" style="grid-row: span 2; display: flex; align-items: center; justify-content: center;">=</button>
        <button class="calc-key" onclick="calcInput('0')" style="grid-column: span 2;">0</button>
        <button class="calc-key" onclick="calcInput('.')">.</button>
    </div>
</div>

<script>
    // Firebase 연결 (본인 계정 정보)
    const firebaseConfig = {
        apiKey: "AIzaSyBJ71IhAdTuQ2msJR_28Fyo50Q7Map5u58",
        authDomain: "money-c34ec.firebaseapp.com",
        projectId: "money-c34ec",
        storageBucket: "money-c34ec.firebasestorage.app",
        messagingSenderId: "969800282507",
        appId: "1:969800282507:web:c1fc6cdfd7417526e57f8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let categories = {
        income: ['급여', '용돈', '부수입', '상여금'],
        expense: ['식비', '교통비', '문화생활', '생필품', '주거/통신']
    };
    let entries = [];
    let fixedEntries = [];
    
    // 테이블 정렬 및 인라인 수정 상태 변수
    let sortConfig = { key: 'date', direction: 'desc' };
    let inlineEditingId = null;

    let expenseChartInstance = null;
    let incomeChartInstance = null;
    
    // 구분이 명확한 차트 다색 팔레트 적용
    const chartColorPalette = [
        '#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', 
        '#06b6d4', '#ec4899', '#84cc16', '#6366f1', '#f97316'
    ];

    window.onload = function() {
        const today = new Date();
        const currentMonth = today.toISOString().slice(0, 7);
        document.getElementById('searchMonth').value = currentMonth;
        document.getElementById('statsMonth').value = currentMonth;
        document.getElementById('dateInput').value = today.toISOString().slice(0, 10);
        
        db.collection("budget").doc("my_data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                categories = data.categories || categories;
                entries = data.entries || [];
                fixedEntries = data.fixedEntries || [];
            } else { saveData(); }
            
            updateCategoryOptions();
            updateFixedCategoryOptions();
            renderDataTab();
            renderFixedTable(); 
            
            checkAndApplyFixedEntries(document.getElementById('searchMonth').value);
            
            renderTables();
            updateStatsTab();
        });
    };

    function saveData() {
        db.collection("budget").doc("my_data").set({ categories, entries, fixedEntries })
        .catch(error => console.error("저장 오류:", error));
    }

    /* ==== 고정 자금 기능 ==== */
    function updateFixedCategoryOptions() {
        const type = document.getElementById('fixedType').value;
        const select = document.getElementById('fixedCategory');
        select.innerHTML = categories[type].map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }

    function addFixedEntry() {
        const type = document.getElementById('fixedType').value;
        const day = parseInt(document.getElementById('fixedDay').value);
        const category = document.getElementById('fixedCategory').value;
        const detail = document.getElementById('fixedDetail').value.trim();
        const amount = parseInt(document.getElementById('fixedAmount').value);

        if(!day || day < 1 || day > 31 || !detail || !amount) {
            return alert("모든 항목을 올바르게 입력해 주세요. (날짜는 1~31)");
        }
        
        fixedEntries.push({ id: Date.now(), type, day, category, detail, amount });
        
        // Firebase 저장 전 즉각 UI 렌더링으로 딜레이 방지
        renderFixedTable();
        const currentMonth = document.getElementById('searchMonth').value;
        checkAndApplyFixedEntries(currentMonth); 
        
        saveData();
        
        document.getElementById('fixedDay').value = '';
        document.getElementById('fixedDetail').value = '';
        document.getElementById('fixedAmount').value = '';
    }

    function deleteFixedEntry(id) {
        if (confirm("이 고정 설정을 삭제하시겠습니까?")) {
            fixedEntries = fixedEntries.filter(fe => fe.id !== id);
            renderFixedTable(); // 즉시 UI 반영
            saveData();
        }
    }

    function renderFixedTable() {
        const tbody = document.getElementById('fixedTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        
        fixedEntries.forEach(fe => {
            const tr = document.createElement('tr');
            const typeStr = fe.type === 'income' ? '<span class="txt-income">수입</span>' : '<span class="txt-expense">지출</span>';
            tr.innerHTML = `
                <td>${typeStr}</td>
                <td>매월 ${fe.day}일</td>
                <td>${fe.category}</td>
                <td>${fe.detail}</td>
                <td>${fe.amount.toLocaleString()}</td>
                <td><button class="delete-btn" onclick="deleteFixedEntry(${fe.id})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function checkAndApplyFixedEntries(targetMonth) {
        if (!fixedEntries || fixedEntries.length === 0) return;
        let isUpdated = false;
        
        fixedEntries.forEach(fe => {
            const tag = `fixed-${fe.id}-${targetMonth}`;
            const exists = entries.some(e => e.fixedTag === tag);
            
            if (!exists) {
                const dateStr = `${targetMonth}-${String(fe.day).padStart(2, '0')}`;
                entries.push({
                    id: Date.now() + Math.random(), type: fe.type, date: dateStr, category: fe.category,
                    detail: `[고정] ${fe.detail}`, amount: fe.amount, fixedTag: tag
                });
                isUpdated = true;
            }
        });
        
        if (isUpdated) {
            renderTables(); // 메인 내역 관리 탭 즉시 렌더링
            updateStatsTab(); 
            saveData();
        }
    }

    /* ==== 일반 내역 기능 ==== */
    function setSort(key) {
        if (sortConfig.key === key) {
            sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.key = key;
            sortConfig.direction = 'asc';
        }
        renderTables();
    }

    function syncMonths(selectedMonth) {
        document.getElementById('searchMonth').value = selectedMonth;
        document.getElementById('statsMonth').value = selectedMonth;
        checkAndApplyFixedEntries(selectedMonth);
        renderTables();
        updateStatsTab();
    }

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
        if(tabId === 'statsTab') updateStatsTab();
    }

    function formatNumber(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        input.value = value === '' ? '' : Number(value).toLocaleString('ko-KR');
    }

    function updateCategoryOptions() {
        const type = document.querySelector('input[name="type"]:checked').value;
        const select = document.getElementById('categorySelect');
        select.innerHTML = categories[type].map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }

    function renderDataTab() {
        const renderList = (type, elementId) => {
            document.getElementById(elementId).innerHTML = categories[type].map((item, idx) => `
                <li class="data-item">${item}
                    <span onclick="deleteCategory('${type}', ${idx})" style="cursor:pointer; color:red; font-size:12px;">❌</span>
                </li>`).join('');
        };
        renderList('income', 'dataIncomeList'); 
        renderList('expense', 'dataExpenseList');
    }

    function addCategory(type) {
        const newCat = prompt("추가할 항목명:");
        if (newCat && newCat.trim() !== '') { 
            categories[type].push(newCat.trim()); 
            renderDataTab();
            updateCategoryOptions();
            updateFixedCategoryOptions();
            saveData(); 
        }
    }
    
    function deleteCategory(type, index) {
        if (confirm("삭제하시겠습니까?")) { 
            categories[type].splice(index, 1); 
            renderDataTab();
            updateCategoryOptions();
            updateFixedCategoryOptions();
            saveData(); 
        }
    }

    function addNewEntry() {
        const type = document.querySelector('input[name="type"]:checked').value;
        const date = document.getElementById('dateInput').value;
        const category = document.getElementById('categorySelect').value;
        const detail = document.getElementById('detailInput').value;
        const amount = Number(document.getElementById('amountInput').value.replace(/,/g, ''));
        
        if (!date || !amount) return alert("날짜와 금액을 입력해주세요.");
        
        entries.push({ id: Date.now(), type, date, category, detail, amount });
        
        renderTables(); // 즉시 화면 갱신
        updateStatsTab();
        
        document.getElementById('detailInput').value = ''; 
        document.getElementById('amountInput').value = '';
        saveData();
    }

    function deleteEntry(id) { 
        if (confirm("이 내역을 삭제할까요?")) { 
            entries = entries.filter(e => e.id !== id); 
            renderTables(); // 즉시 화면 갱신
            updateStatsTab();
            saveData(); 
        } 
    }

    /* ==== 인라인 수정 기능 ==== */
    function startInlineEdit(id) {
        inlineEditingId = id;
        renderTables();
    }
    
    function cancelInlineEdit() {
        inlineEditingId = null;
        renderTables();
    }

    function saveInlineEdit(id, type) {
        const date = document.getElementById(`edit_date_${id}`).value;
        const category = document.getElementById(`edit_cat_${id}`).value;
        const detail = document.getElementById(`edit_detail_${id}`).value;
        const amount = Number(document.getElementById(`edit_amt_${id}`).value);

        if (!date || !amount) return alert("날짜와 금액은 필수입니다.");

        const index = entries.findIndex(e => e.id === id);
        if (index > -1) {
            entries[index] = { ...entries[index], date, category, detail, amount };
            inlineEditingId = null;
            
            renderTables(); // 즉각 렌더링
            updateStatsTab();
            
            saveData();
        }
    }

    /* ==== 메인 내역 테이블 렌더링 ==== */
    function renderTables() {
        const searchMonth = document.getElementById('searchMonth').value;
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        
        let filtered = entries.filter(e => {
            return e.date.startsWith(searchMonth) && (e.detail.toLowerCase().includes(keyword) || e.category.toLowerCase().includes(keyword));
        });

        filtered.sort((a, b) => {
            let valA = a[sortConfig.key];
            let valB = b[sortConfig.key];
            if (sortConfig.key === 'amount') { valA = Number(valA); valB = Number(valB); }
            
            if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
            if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
        });

        const incBody = document.getElementById('incomeTableBody');
        const expBody = document.getElementById('expenseTableBody');
        incBody.innerHTML = ''; expBody.innerHTML = '';
        let totalInc = 0, totalExp = 0;

        filtered.forEach(entry => {
            const tr = document.createElement('tr');
            
            if (entry.id === inlineEditingId) {
                const catOptions = categories[entry.type].map(c => `<option value="${c}" ${c===entry.category?'selected':''}>${c}</option>`).join('');
                tr.innerHTML = `
                    <td><input type="date" id="edit_date_${entry.id}" class="inline-input" value="${entry.date}"></td>
                    <td><select id="edit_cat_${entry.id}" class="inline-input">${catOptions}</select></td>
                    <td><input type="text" id="edit_detail_${entry.id}" class="inline-input" value="${entry.detail}"></td>
                    <td><input type="number" id="edit_amt_${entry.id}" class="inline-input" value="${entry.amount}"></td>
                    <td class="action-btns">
                        <button class="save-inline-btn" onclick="saveInlineEdit(${entry.id}, '${entry.type}')">저장</button>
                        <button class="cancel-inline-btn" onclick="cancelInlineEdit()">취소</button>
                    </td>
                `;
            } else {
                tr.innerHTML = `
                    <td>${entry.date.slice(5)}</td>
                    <td>${entry.category}</td>
                    <td style="text-align:left;">${entry.detail}</td>
                    <td style="font-weight:bold;">${entry.amount.toLocaleString()}</td>
                    <td class="action-btns">
                        <button class="edit-btn" onclick="startInlineEdit(${entry.id})">수정</button>
                        <button class="delete-btn" onclick="deleteEntry(${entry.id})">삭제</button>
                    </td>
                `;
            }

            if (entry.type === 'income') { incBody.appendChild(tr); totalInc += entry.amount; } 
            else { expBody.appendChild(tr); totalExp += entry.amount; }
        });

        if(incBody.innerHTML === '') incBody.innerHTML = '<tr><td colspan="5">내역 없음</td></tr>';
        if(expBody.innerHTML === '') expBody.innerHTML = '<tr><td colspan="5">내역 없음</td></tr>';

        document.getElementById('subTotalIncome').textContent = `${totalInc.toLocaleString()} 원`;
        document.getElementById('subTotalExpense').textContent = `${totalExp.toLocaleString()} 원`;
        document.getElementById('totalIncome').textContent = totalInc.toLocaleString() + "원";
        document.getElementById('totalExpense').textContent = totalExp.toLocaleString() + "원";
        document.getElementById('netTotal').textContent = (totalInc - totalExp).toLocaleString() + "원";
    }

    /* ==== 통계 업데이트 (달력, 차트, 코멘트) ==== */
    function updateStatsTab() {
        renderCalendar();
        renderCharts();
        renderComparisonComment(); 
    }

    function renderCalendar() {
        const targetMonth = document.getElementById('statsMonth').value;
        if (!targetMonth) return;
        const [year, month] = targetMonth.split('-');
        const firstDay = new Date(year, month - 1, 1).getDay();
        const lastDate = new Date(year, month, 0).getDate();

        const calBox = document.getElementById('calendarGrid');
        let html = '';
        ['일', '월', '화', '수', '목', '금', '토'].forEach(d => html += `<div class="cal-header">${d}</div>`);
        for(let i = 0; i < firstDay; i++) html += `<div class="cal-day cal-empty"></div>`;

        let maxInc = 0; let maxExp = 0;
        const dailyData = [];

        for(let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${month}-${String(i).padStart(2, '0')}`;
            const dayEntries = entries.filter(e => e.date === dateStr);
            let inc = 0, exp = 0;
            dayEntries.forEach(e => { if(e.type === 'income') inc += e.amount; else exp += e.amount; });
            if(inc > maxInc) maxInc = inc;
            if(exp > maxExp) maxExp = exp;
            dailyData.push({ date: dateStr, dayNum: i, inc, exp });
        }

        dailyData.forEach(data => {
            let barsHtml = '<div class="cal-bar-wrapper">';
            if (data.inc > 0) barsHtml += `<div class="cal-bar-inc" style="width: ${(data.inc / maxInc) * 100}%;"></div>`;
            if (data.exp > 0) barsHtml += `<div class="cal-bar-exp" style="width: ${(data.exp / maxExp) * 100}%;"></div>`;
            barsHtml += '</div>';
            html += `
                <div class="cal-day" onclick="alert('${data.date} 요약\\n\\n🔵 수입: ${data.inc.toLocaleString()}원\\n🔴 지출: ${data.exp.toLocaleString()}원')">
                    <div class="cal-date">${data.dayNum}</div>
                    ${(data.inc > 0 || data.exp > 0) ? barsHtml : ''}
                </div>
            `;
        });
        calBox.innerHTML = html;
    }

    function renderCharts() {
        const targetMonth = document.getElementById('statsMonth').value;
        const filtered = entries.filter(e => e.date && e.date.startsWith(targetMonth));
        const expData = {}; const incData = {};
        
        filtered.forEach(e => {
            if (e.type === 'expense') expData[e.category] = (expData[e.category] || 0) + e.amount;
            else incData[e.category] = (incData[e.category] || 0) + e.amount;
        });
        
        if (expenseChartInstance) expenseChartInstance.destroy();
        if (incomeChartInstance) incomeChartInstance.destroy();

        const createChart = (boxId, canvasId, dataObj, title, colors) => {
            const box = document.getElementById(boxId);
            if(Object.keys(dataObj).length === 0) { box.innerHTML = `<div class="no-data-msg">${title} 내역이 없습니다.</div>`; return null; }
            box.innerHTML = `<canvas id="${canvasId}"></canvas>`;
            return new Chart(document.getElementById(canvasId), {
                type: 'doughnut',
                data: { labels: Object.keys(dataObj), datasets: [{ data: Object.values(dataObj), backgroundColor: colors }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        };
        
        // 두 차트 모두 구분이 잘 가는 다양한 색상 적용
        expenseChartInstance = createChart('expenseChartBox', 'expenseChart', expData, '지출', chartColorPalette);
        incomeChartInstance = createChart('incomeChartBox', 'incomeChart', incData, '수입', chartColorPalette);
    }

    function renderComparisonComment() {
        const targetMonth = document.getElementById('statsMonth').value;
        if (!targetMonth) return;
        
        const [year, month] = targetMonth.split('-').map(Number);
        const prevMonthStr = `${month === 1 ? year - 1 : year}-${String(month === 1 ? 12 : month - 1).padStart(2, '0')}`;
        
        const currExp = entries.filter(e => e.date.startsWith(targetMonth) && e.type === 'expense');
        const prevExp = entries.filter(e => e.date.startsWith(prevMonthStr) && e.type === 'expense');
        
        const box = document.getElementById('comparisonComment');
        if (currExp.length === 0) {
            box.className = "comment-box";
            box.textContent = "💡 아직 이번 달 지출 내역이 없습니다. 소비를 기록해 보세요!";
            return;
        }

        const currSums = {}; const prevSums = {};
        currExp.forEach(e => currSums[e.category] = (currSums[e.category] || 0) + e.amount);
        prevExp.forEach(e => prevSums[e.category] = (prevSums[e.category] || 0) + e.amount);
        
        const increased = [];
        for (const cat in currSums) {
            const diff = currSums[cat] - (prevSums[cat] || 0);
            if (diff > 0) increased.push({ category: cat, diff });
        }
        increased.sort((a, b) => b.diff - a.diff);

        if (increased.length > 0) {
            box.className = "comment-box warn";
            let html = `🚨 <b>지출 경고!</b> 지난달보다 지출이 늘어난 항목이 있습니다.<br><div style="text-align: left; margin-top: 10px;">`;
            increased.forEach(item => html += `<div>• <b>${item.category}</b> : <span class="txt-expense">+${item.diff.toLocaleString()}원</span></div>`);
            box.innerHTML = html + `</div>`;
        } else {
            box.className = "comment-box";
            box.innerHTML = `👏 <b>훌륭합니다!</b> 지난달 대비 지출이 증가한 항목이 없습니다.`;
        }
    }

    /* ==== 플로팅 계산기 로직 ==== */
    let calcValue = '';
    function toggleCalculator() {
        const panel = document.getElementById('calcPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function calcInput(val) {
        const display = document.getElementById('calcDisplay');
        if (val === 'C') {
            calcValue = ''; display.value = '0';
        } else if (val === '=') {
            try { calcValue = eval(calcValue).toString(); display.value = calcValue; } 
            catch(e) { display.value = 'Error'; calcValue = ''; }
        } else {
            if (calcValue === '0' && val !== '.') calcValue = '';
            calcValue += val;
            display.value = calcValue;
        }
    }

    /* ==== 백업/복구 기능 ==== */
    function exportData() {
        const blob = new Blob([JSON.stringify({ categories, entries, fixedEntries }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `가계부백업_${new Date().toISOString().slice(0, 10)}.json`; a.click();
    }
    function importData(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.categories && data.entries) { 
                    categories = data.categories; entries = data.entries; fixedEntries = data.fixedEntries || []; 
                    
                    // 파일 불러오기 시 UI 즉각 새로고침
                    updateCategoryOptions();
                    updateFixedCategoryOptions();
                    renderDataTab();
                    renderFixedTable();
                    renderTables();
                    updateStatsTab();
                    
                    saveData(); 
                    alert("복구 완료!"); 
                }
            } catch (err) { alert("파일 오류"); }
        };
        reader.readAsText(file);
    }
</script>
